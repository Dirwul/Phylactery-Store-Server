<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>ОКАК</title>
	<style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Montserrat", sans-serif;
            background: #050505;
            color: #fff;
            overflow: hidden;
        }
        .app {
            position: relative;
            height: 100vh;
            width: 100%;
        }
        .img {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 100%;
            animation: catAnim 1.5s ease forwards;
        }
        .img img {
            width: 100%;
            height: auto;
            object-fit: cover;
        }
        .okak {
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            font-weight: 900;
            font-size: clamp(32px, 10vw, 115px);
            text-align: center;
            white-space: nowrap;
        }
        .error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, 800px);
            font-size: clamp(100px, 30vw, 750px);
            font-weight: 900;
            animation: errorAnim 1.5s ease forwards;
            white-space: nowrap;
            text-align: center;
        }

        @keyframes errorAnim {
            to {
                transform: translate(-50%, -40%);
            }
        }

        @keyframes catAnim {
            from {
                transform: translate(-50%, 50%);
            }
            to {
                transform: translate(-50%, 0);
            }
        }

        @media (max-height: 600px) {
            .okak {
                bottom: 10%;
            }
        }
	</style>
</head>
<body>
<div class="app">
	<div class="error">404</div>
	<div class="img">
		<img src="cat.png" alt="cat">
		<h1 class="okak">ОКАК</h1>
	</div>
</div>
</body>
</html>
